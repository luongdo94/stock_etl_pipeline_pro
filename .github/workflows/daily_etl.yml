name: Daily Stock ETL Pipeline

on:
  schedule:
    # Run automatically at 23:00 UTC (6:00 AM VN time) from Monday to Friday.
    - cron: '0 23 * * 1-5'
  workflow_dispatch: # Allow manual trigger from the GitHub UI

permissions:
  contents: write

jobs:
  run-etl:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Run Full ETL Pipeline
        run: |
          echo "🚀 Starting data extraction from Yahoo Finance..."
          python run.py --full
          
      - name: Commit and Push Updated DuckDB Database
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add warehouse/stock_dw.duckdb
          
          # Only push if there are actual data changes
          git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 Auto-update: Daily stock market data refresh [skip ci]" && git push origin main)
